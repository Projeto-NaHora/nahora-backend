# ── Configuração base (comum a todos os perfis) ─────────────────────────────
spring:
  application:
    name: nahora-backend
  profiles:
    active: dev

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 11MB

  threads:
    virtual:
      enabled: true   # Virtual Threads (Project Loom)

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/nahora}
    username: ${DB_USERNAME:nahora}
    password: ${DB_PASSWORD:nahora_dev}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      database-platform: org.hibernate.spatial.dialect.postgis.PostgisDialect # ◄ ADICIONE ESTA LINHA
      ddl-auto: none    # Flyway gerencia todo o DDL
    open-in-view: false
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

jwt:
  secret: ${JWT_SECRET:dev_secret_apenas_local_troque_em_producao_minimo_256bits}
  expiration-ms: ${JWT_EXPIRATION_MS:900000}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}

storage:
  bucket: ${STORAGE_BUCKET:nahora-dev}
  access-key: ${STORAGE_ACCESS_KEY:dev}
  secret-key: ${STORAGE_SECRET_KEY:dev12345}
  endpoint: ${STORAGE_ENDPOINT:http://localhost:9000}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# ── Perfil: dev ──────────────────────────────────────────────────────────────
---
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.nahora: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG

# ── Perfil: prod ─────────────────────────────────────────────────────────────
---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

logging:
  level:
    com.nahora: INFO
    root: WARN
