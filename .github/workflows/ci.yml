name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: nahora
          POSTGRES_USER: nahora
          POSTGRES_PASSWORD: nahora_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run unit tests
        run: ./mvnw test -Dgroups="unit" -q

      - name: Run integration tests
        run: ./mvnw test -Dgroups="integration" -q
        env:
          DB_URL: jdbc:postgresql://localhost:5432/nahora
          DB_USERNAME: nahora
          DB_PASSWORD: nahora_dev
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: ci_secret_apenas_para_testes_minimo_256bits_xxxxxxxxxxx
