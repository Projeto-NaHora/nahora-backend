services:

  postgres:
    image: postgis/postgis:16-3.4
    container_name: nahora-postgres
    environment:
      POSTGRES_DB: nahora
      POSTGRES_USER: nahora
      POSTGRES_PASSWORD: nahora_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nahora -d nahora"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nahora-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"  # console web
    environment:
      MINIO_ROOT_USER: dev
      MINIO_ROOT_PASSWORD: dev12345
    command: server /data --console-address ":9001"
volumes:
  postgres_data:
  redis_data:
